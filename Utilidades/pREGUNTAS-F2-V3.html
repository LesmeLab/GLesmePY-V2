<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Preguntas IA - Multilínea</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .config-bar {
            background-color: #e1e1e1;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .config-bar label {
            font-weight: bold;
        }
        input[type="text"], select {
            padding: 5px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        textarea {
            width: 100%;
            height: 250px;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            background-color: #0078D7;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #005a9e;
        }
        #status {
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <h2>Generador de Imágenes de Preguntas</h2>
    <p>Formato: Courier New, Tamaño 40px, Ancho 2000px con <strong>Salto de línea automático</strong>.</p>
    
    <div class="config-bar">
        <div>
            <label for="momentoSelect">Momento:</label>
            <select id="momentoSelect">
                <option value="PP">PP</option>
                <option value="SP">SP</option>
                <option value="PF">PF</option>
                <option value="SF">SF</option>
            </select>
        </div>
        <div>
            <label for="fechaInput">Fecha (DDMMAAAA):</label>
            <input type="text" id="fechaInput" placeholder="Ej: 30052026" maxlength="8">
        </div>
    </div>

    <textarea id="jsonInput" placeholder='Pegue el JSON aquí...'></textarea>
    <br>
    <button onclick="generarImagenes()">Generar y Descargar ZIP</button>
    <p id="status"></p>

    <script>
        // Función auxiliar para cortar el texto en varias líneas si excede el ancho máximo
        function obtenerLineas(ctx, texto, anchoMaximo) {
            let palabras = texto.split(' ');
            let lineas = [];
            let lineaActual = palabras[0];

            for (let i = 1; i < palabras.length; i++) {
                let palabra = palabras[i];
                let ancho = ctx.measureText(lineaActual + " " + palabra).width;
                if (ancho < anchoMaximo) {
                    lineaActual += " " + palabra;
                } else {
                    lineas.push(lineaActual);
                    lineaActual = palabra;
                }
            }
            lineas.push(lineaActual);
            return lineas;
        }

        async function generarImagenes() {
            const inputTexto = document.getElementById('jsonInput').value;
            const statusText = document.getElementById('status');
            const momento = document.getElementById('momentoSelect').value;
            const fecha = document.getElementById('fechaInput').value;
            
            if (fecha.length !== 8 || isNaN(fecha)) {
                statusText.style.color = "red";
                statusText.innerText = "Error: La fecha debe tener exactamente 8 números (DDMMAAAA).";
                return;
            }

            if (!inputTexto.trim()) {
                statusText.style.color = "red";
                statusText.innerText = "Error: Por favor, pega el JSON antes de generar.";
                return;
            }

            try {
                const datos = JSON.parse(inputTexto);
                const zip = new JSZip();
                
                statusText.style.color = "blue";
                statusText.innerText = "Calculando espacios y generando imágenes...";

                const ancho = 2000;
                const margen = 40; // Aumenté el margen un poco por estética
                const tamañoFuente = 40; 
                const interlineado = 60; 
                const anchoMaximoTexto = ancho - (margen * 2);

                for (let i = 0; i < datos.length; i++) {
                    const item = datos[i];
                    
                    // Usamos un canvas temporal solo para medir el texto antes de dibujarlo
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    ctx.font = `${tamañoFuente}px "Courier New", Courier, monospace`;

                    // 1. Calcular líneas de la pregunta
                    const lineasPregunta = obtenerLineas(ctx, item.pregunta, anchoMaximoTexto);
                    
                    // 2. Calcular líneas de cada opción
                    let lineasOpciones = {};
                    let totalLineasOpciones = 0;
                    
                    for (const [letra, texto] of Object.entries(item.opciones)) {
                        let textoCompleto = `${letra}) ${texto}`;
                        let lineas = obtenerLineas(ctx, textoCompleto, anchoMaximoTexto);
                        lineasOpciones[letra] = lineas;
                        totalLineasOpciones += lineas.length;
                    }

                    // 3. Calcular la altura dinámica exacta que necesita esta imagen
                    // Altura = Pregunta + 1 línea blanca + Opciones
                    const totalLineasEnImagen = lineasPregunta.length + 1 + totalLineasOpciones;
                    const alto = (margen * 2) + (totalLineasEnImagen * interlineado);

                    // 4. Ahora sí, configuramos el lienzo con sus dimensiones reales
                    canvas.width = ancho;
                    canvas.height = alto;

                    // Al cambiar el tamaño del canvas, el contexto se resetea. Volvemos a configurarlo:
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.textBaseline = "top";
                    let y = margen;

                    // 5. Dibujar la pregunta línea por línea
                    ctx.fillStyle = "#000000";
                    ctx.font = `${tamañoFuente}px "Courier New", Courier, monospace`;
                    for (let j = 0; j < lineasPregunta.length; j++) {
                        ctx.fillText(lineasPregunta[j], margen, y);
                        y += interlineado;
                    }
                    
                    // Salto de línea en blanco extra
                    y += interlineado;

                    // 6. Dibujar las opciones
                    for (const [letra, texto] of Object.entries(item.opciones)) {
                        let lineasDeEstaOpcion = lineasOpciones[letra];

                        if (letra === item.RTA) {
                            // Primera línea de la respuesta correcta (lleva negrita en la letra)
                            ctx.font = `bold ${tamañoFuente}px "Courier New", Courier, monospace`;
                            ctx.fillText(letra, margen, y);
                            
                            const anchoLetra = ctx.measureText(letra).width;
                            
                            ctx.font = `${tamañoFuente}px "Courier New", Courier, monospace`;
                            // Imprimimos el resto de la primera línea omitiendo la letra inicial
                            ctx.fillText(lineasDeEstaOpcion[0].substring(letra.length), margen + anchoLetra, y);
                            y += interlineado;

                            // Si la opción correcta ocupó más de una línea, las siguientes van normal
                            for (let j = 1; j < lineasDeEstaOpcion.length; j++) {
                                ctx.fillText(lineasDeEstaOpcion[j], margen, y);
                                y += interlineado;
                            }
                        } else {
                            // Opciones incorrectas se imprimen normales línea por línea
                            ctx.font = `${tamañoFuente}px "Courier New", Courier, monospace`;
                            for (let j = 0; j < lineasDeEstaOpcion.length; j++) {
                                ctx.fillText(lineasDeEstaOpcion[j], margen, y);
                                y += interlineado;
                            }
                        }
                    }

                    // 7. Empaquetar
                    const base64Data = canvas.toDataURL("image/png").replace(/^data:image\/png;base64,/, "");
                    const nombreArchivo = `Fisica2_${momento}_1_T_${fecha}_${i + 1}.png`;
                    zip.file(nombreArchivo, base64Data, {base64: true});
                }

                statusText.innerText = "Empaquetando ZIP...";
                const contenidoZip = await zip.generateAsync({ type: "blob" });
                
                const url = URL.createObjectURL(contenidoZip);
                const a = document.createElement("a");
                a.href = url;
                a.download = `Fisica2_${momento}_${fecha}.zip`; 
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                statusText.style.color = "green";
                statusText.innerText = `¡Éxito! Se generó un ZIP con ${datos.length} imágenes multilínea.`;

            } catch (error) {
                statusText.style.color = "red";
                statusText.innerText = "Error: El formato del JSON no es válido. Revisa que no falten comillas o comas. (" + error.message + ")";
            }
        }
    </script>
</body>
</html>
