<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Simulacros v4 (Oficio + Exclusión)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #4F46E5; --primary-hover: #4338CA; --bg: #F3F4F6; --surface: #FFFFFF; --text: #1F2937; --border: #D1D5DB; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); padding: 2rem; display: flex; justify-content: center; margin: 0;}
        .container { background-color: var(--surface); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        h1 { text-align: center; font-size: 1.5rem; margin-top: 0; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input[type="file"], select, input[type="number"] { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        .row { display: flex; gap: 1rem; }
        .row .form-group { flex: 1; }
        button { width: 100%; background-color: var(--primary); color: white; border: none; padding: 1rem; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 1rem; transition: 0.2s; }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #9CA3AF; cursor: not-allowed; }
        .btn-secondary { background-color: #6B7280; margin-top: 0; padding: 0.75rem; font-size: 0.9rem;}
        .btn-secondary:hover { background-color: #4B5563; }
        
        /* Estilos del Acordeón de Exclusión */
        #exclusionWrapper { margin-top: 1rem; margin-bottom: 1rem; }
        .accordion-header { background-color: #E5E7EB; padding: 0.75rem; cursor: pointer; font-weight: 600; border-radius: 6px; margin-top: 0.5rem; display: flex; justify-content: space-between; font-size: 0.9rem;}
        .accordion-header:hover { background-color: #D1D5DB; }
        .accordion-body { padding: 0.75rem; border: 1px solid #E5E7EB; border-top: none; border-bottom-left-radius: 6px; border-bottom-right-radius: 6px; background-color: #F9FAFB; display: none; max-height: 200px; overflow-y: auto;}
        .accordion-body.active { display: block; }
        .file-item { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; font-size: 0.85rem; color: #4B5563;}
        .file-item input[type="checkbox"] { width: auto; margin: 0; cursor: pointer;}
        
        #status { margin-top: 1rem; text-align: center; font-size: 0.9rem; color: #059669; font-weight: bold; }
        #error { margin-top: 1rem; text-align: center; font-size: 0.9rem; color: #DC2626; font-weight: bold; }
        .hidden { display: none !important; }
        .info-text { font-size: 0.8rem; color: #6B7280; margin-top: 0.25rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Generador de Simulacros</h1>

    <div class="form-group">
        <label for="folderInput">Selecciona la carpeta con las imágenes</label>
        <input type="file" id="folderInput" webkitdirectory directory multiple>
        <div class="info-text">Formato: Materia_Momento_Prioridad_Tipo_Fecha_Num.ext</div>
    </div>

    <div id="filtersPanel" class="hidden">
        <div class="form-group">
            <label for="materiaSelect">Materia</label>
            <select id="materiaSelect"></select>
        </div>
        <div class="form-group">
            <label for="momentoSelect">Momento de Examen</label>
            <select id="momentoSelect" disabled></select>
        </div>
        
        <div id="exclusionWrapper" class="hidden">
            <button id="toggleExclusionBtn" class="btn-secondary" type="button">Mostrar panel de exclusión de ejercicios</button>
            <div id="exclusionListContainer" class="hidden"></div>
        </div>

        <div class="form-group">
            <label for="totalEjercicios">Cantidad total de ejercicios</label>
            <input type="number" id="totalEjercicios" min="1" value="5">
        </div>
        <div class="row">
            <div class="form-group">
                <label for="porcentajeTeoria">% Teoría</label>
                <input type="number" id="porcentajeTeoria" min="0" max="100" value="50">
            </div>
            <div class="form-group">
                <label for="porcentajePractica">% Práctica</label>
                <input type="number" id="porcentajePractica" value="50" readonly>
            </div>
        </div>
        <button id="generateBtn">Generar y Descargar PDF</button>
    </div>

    <div id="status"></div>
    <div id="error"></div>
</div>

<script>
    // --- Variables Globales ---
    let archivosValidos = [];
    const diccionarioMomentos = { 'PP': 'Primer Parcial', 'SP': 'Segundo Parcial', 'PF': 'Primer Final', 'SF': 'Segundo Final' };

    // --- Elementos del DOM ---
    const folderInput = document.getElementById('folderInput');
    const filtersPanel = document.getElementById('filtersPanel');
    const materiaSelect = document.getElementById('materiaSelect');
    const momentoSelect = document.getElementById('momentoSelect');
    const porcentajeTeoria = document.getElementById('porcentajeTeoria');
    const porcentajePractica = document.getElementById('porcentajePractica');
    const totalEjercicios = document.getElementById('totalEjercicios');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    const errorDiv = document.getElementById('error');
    
    // Panel de exclusión
    const exclusionWrapper = document.getElementById('exclusionWrapper');
    const toggleExclusionBtn = document.getElementById('toggleExclusionBtn');
    const exclusionListContainer = document.getElementById('exclusionListContainer');

    // --- Lógica de Interfaz ---
    porcentajeTeoria.addEventListener('input', (e) => {
        let val = Math.min(100, Math.max(0, parseInt(e.target.value) || 0));
        e.target.value = val;
        porcentajePractica.value = 100 - val;
    });

    folderInput.addEventListener('change', (e) => {
        archivosValidos = [];
        const files = e.target.files;
        const regex = /^([A-Za-z0-9]+)_([A-Z]{2})_([1-9])_([TP])_(\d+)_(\d+)\.(jpg|jpeg|png)$/i;

        for (let file of files) {
            const match = file.name.match(regex);
            if (match) {
                archivosValidos.push({
                    file: file,
                    materia: match[1],
                    momento: match[2],
                    prioridad: parseInt(match[3]),
                    tipo: match[4].toUpperCase(),
                    fecha: match[5]
                });
            }
        }

        if (archivosValidos.length > 0) {
            filtersPanel.classList.remove('hidden');
            actualizarMaterias();
            statusDiv.innerText = `Cargadas ${archivosValidos.length} imágenes correctamente.`;
            errorDiv.innerText = '';
        } else {
            filtersPanel.classList.add('hidden');
            errorDiv.innerText = 'No hay imágenes válidas. Revisa el formato de los nombres.';
        }
    });

    function actualizarMaterias() {
        const materiasUnicas = [...new Set(archivosValidos.map(a => a.materia))];
        materiaSelect.innerHTML = '<option value="">Seleccionar...</option>' + 
            materiasUnicas.map(m => `<option value="${m}">${m}</option>`).join('');
        momentoSelect.innerHTML = '<option value="">Primero elige materia</option>';
        momentoSelect.disabled = true;
        exclusionWrapper.classList.add('hidden');
    }

    materiaSelect.addEventListener('change', (e) => {
        const mat = e.target.value;
        exclusionWrapper.classList.add('hidden');
        if (!mat) {
            momentoSelect.innerHTML = '<option value="">Primero elige materia</option>';
            momentoSelect.disabled = true;
            return;
        }
        const momentos = [...new Set(archivosValidos.filter(a => a.materia === mat).map(a => a.momento))];
        momentoSelect.innerHTML = '<option value="">Seleccionar...</option>' + 
            momentos.map(m => `<option value="${m}">${diccionarioMomentos[m] || m}</option>`).join('');
        momentoSelect.disabled = false;
    });

    momentoSelect.addEventListener('change', (e) => {
        if (e.target.value && materiaSelect.value) {
            construirPanelExclusion();
            exclusionWrapper.classList.remove('hidden');
        } else {
            exclusionWrapper.classList.add('hidden');
        }
    });

    toggleExclusionBtn.addEventListener('click', () => {
        exclusionListContainer.classList.toggle('hidden');
        if (exclusionListContainer.classList.contains('hidden')) {
            toggleExclusionBtn.innerText = 'Mostrar panel de exclusión de ejercicios';
        } else {
            toggleExclusionBtn.innerText = 'Ocultar panel de exclusión';
        }
    });

    // --- Lógica del Acordeón de Exclusión ---
    function construirPanelExclusion() {
        const mat = materiaSelect.value;
        const mom = momentoSelect.value;
        
        // Filtrar archivos de la materia y momento actuales
        const pool = archivosValidos.filter(a => a.materia === mat && a.momento === mom);
        
        // Agrupar por fecha
        const agrupadosPorFecha = {};
        pool.forEach(a => {
            if (!agrupadosPorFecha[a.fecha]) agrupadosPorFecha[a.fecha] = [];
            agrupadosPorFecha[a.fecha].push(a);
        });

        exclusionListContainer.innerHTML = '';
        
        if (Object.keys(agrupadosPorFecha).length === 0) {
            exclusionListContainer.innerHTML = '<p class="info-text">No hay ejercicios para esta selección.</p>';
            return;
        }

        // Crear los elementos del acordeón
        for (const fecha in agrupadosPorFecha) {
            const archivosDeFecha = agrupadosPorFecha[fecha];
            
            // Header del acordeón
            const header = document.createElement('div');
            header.className = 'accordion-header';
            header.innerHTML = `<span>📅 Fecha: ${fecha}</span> <span>▼</span>`;
            
            // Cuerpo del acordeón
            const body = document.createElement('div');
            body.className = 'accordion-body';

            archivosDeFecha.forEach(a => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'file-item';
                itemDiv.innerHTML = `
                    <input type="checkbox" id="chk_${a.file.name}" value="${a.file.name}" class="chk-exclusion">
                    <label for="chk_${a.file.name}">${a.file.name} (Prioridad ${a.prioridad}, ${a.tipo})</label>
                `;
                body.appendChild(itemDiv);
            });

            // Toggle al hacer clic
            header.addEventListener('click', () => {
                body.classList.toggle('active');
                const flecha = body.classList.contains('active') ? '▲' : '▼';
                header.innerHTML = `<span>📅 Fecha: ${fecha}</span> <span>${flecha}</span>`;
            });

            exclusionListContainer.appendChild(header);
            exclusionListContainer.appendChild(body);
        }
    }

    // --- Lógica Principal: Generación y PDF ---
    generateBtn.addEventListener('click', async () => {
        const mat = materiaSelect.value;
        const mom = momentoSelect.value;
        const total = parseInt(totalEjercicios.value);
        const pTeo = parseInt(porcentajeTeoria.value);

        if (!mat || !mom) return alert("Completa los filtros de Materia y Momento");

        generateBtn.disabled = true;
        statusDiv.innerText = 'Procesando imágenes...';

        try {
            // Recopilar nombres de archivos marcados para exclusión
            const checkboxesExclusion = document.querySelectorAll('.chk-exclusion:checked');
            const nombresExcluidos = Array.from(checkboxesExclusion).map(chk => chk.value);

            // Filtrar pool (Materia, Momento) y quitar los excluidos
            const pool = archivosValidos.filter(a => 
                a.materia === mat && 
                a.momento === mom &&
                !nombresExcluidos.includes(a.file.name)
            );

            const nTeo = Math.round(total * (pTeo / 100));
            const nPrac = total - nTeo;

            const finalTeo = seleccionar(pool.filter(a => a.tipo === 'T'), nTeo);
            const finalPrac = seleccionar(pool.filter(a => a.tipo === 'P'), nPrac);
            
            let examen = [...finalTeo, ...finalPrac].sort((a, b) => a.prioridad - b.prioridad);

            if (examen.length === 0) throw new Error("No hay suficientes imágenes disponibles (quizás excluiste demasiadas).");

            await crearPDF(examen, mat, mom);
            statusDiv.innerText = '¡PDF Generado y descargado exitosamente!';
        } catch (err) {
            errorDiv.innerText = err.message;
            statusDiv.innerText = '';
        } finally {
            generateBtn.disabled = false;
        }
    });

    // --- Sistema de Selección Aleatoria ---
    function seleccionar(pool, cant) {
        if (pool.length === 0) return [];
        let res = [];
        let cubetas = { 1: [], 2: [], 3: [], 4: [] };
        
        pool.forEach(i => cubetas[Math.min(4, i.prioridad)].push(i));
        Object.values(cubetas).forEach(c => c.sort(() => Math.random() - 0.5));

        let patron = [1, 1, 2, 3, 4]; // Da más peso a las primeras cubetas
        let i = 0;
        
        while (res.length < cant) {
            let p = patron[i % patron.length];
            if (cubetas[p].length > 0) {
                res.push(cubetas[p].pop());
            } else {
                let backup = Object.values(cubetas).find(c => c.length > 0);
                if (backup) res.push(backup.pop()); else break;
            }
            i++;
        }
        return res;
    }

    // --- Construcción del PDF (Tamaño Oficio) ---
    async function crearPDF(lista, mat, mom) {
        const { jsPDF } = window.jspdf;
        // Medidas Oficio/Folio en milímetros: 21.59 cm x 33.00 cm
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [215.9, 330] });
        let y = 20;

        doc.setFontSize(16);
        doc.text(`Simulacro: ${mat} (${diccionarioMomentos[mom] || mom})`, 107.95, y, { align: 'center' });
        y += 15;

        for (let ej of lista) {
            const dataUrl = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = e => r(e.target.result);
                reader.readAsDataURL(ej.file);
            });

            const img = await new Promise(r => {
                const i = new Image();
                i.onload = () => r(i);
                i.src = dataUrl;
            });

            // Ancho aprovechable (dejando 20mm margen por lado) -> 175mm
            let w = 175;
            let h = (img.height * w) / img.width;
            
            // Límite de alto (130mm max por imagen para que entren varias)
            if (h > 130) { 
                h = 130; 
                w = (img.width * h) / img.height; 
            }

            // Si sobrepasa el límite inferior (330mm - 20mm = 310mm), crear nueva página
            if (y + h > 310) { 
                doc.addPage(); 
                y = 20; 
            }

            doc.addImage(dataUrl, 'JPEG', 20, y, w, h);
            y += h + 4;
            
            // Texto descriptivo debajo de la imagen
            doc.setFontSize(7);
            doc.setTextColor(150);
            doc.text(`ID (Fecha): ${ej.fecha} | Prioridad: ${ej.prioridad}`, 20, y);
            y += 10;
        }
        doc.save(`Simulacro_${mat}.pdf`);
    }
</script>
</body>
</html>
